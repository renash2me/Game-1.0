# Aceitar conexões de qualquer interface (necessário para Docker networking)
listen_addresses = '*'

# Durabilidade — garante que dados escritos chegam ao disco
fsync = on
synchronous_commit = on
full_page_writes = on

# Checkpoint mais frequente (padrão é 5min — muito espaçado para Raspberry Pi sem UPS)
checkpoint_timeout = 1min
checkpoint_completion_target = 0.9
max_wal_size = 256MB
min_wal_size = 80MB

# Logging de checkpoints para monitorar
log_checkpoints = on
