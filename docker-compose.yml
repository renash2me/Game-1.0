networks:
  aethermoor_net:
    driver: bridge
    name: aethermoor_net

volumes:
  aethermoor_pgdata:
  aethermoor_redis_data:

services:
  postgres-game:
    image: postgres:16
    container_name: aethermoor_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - aethermoor_pgdata:/var/lib/postgresql/data
    networks:
      - aethermoor_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-game:
    image: redis:7-alpine
    container_name: aethermoor_redis
    restart: unless-stopped
    volumes:
      - aethermoor_redis_data:/data
    networks:
      - aethermoor_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  game-server:
    build:
      context: /home/claude-monitor/mmorpg/server
      dockerfile: Dockerfile
    platform: linux/arm64
    container_name: aethermoor_server
    restart: unless-stopped
    env_file: /home/claude-monitor/mmorpg/.env
    depends_on:
      postgres-game:
        condition: service_healthy
      redis-game:
        condition: service_healthy
    networks:
      - aethermoor_net

  nginx-game:
    image: nginx:alpine
    container_name: aethermoor_nginx
    restart: unless-stopped
    ports:
      - "7080:80"
    volumes:
      - /home/claude-monitor/mmorpg/server/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - game-server
    networks:
      - aethermoor_net
